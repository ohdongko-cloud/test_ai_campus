<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오프라인 — 이랜드리테일 AI 캠퍼스</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: "Noto Sans KR", system-ui, sans-serif; background: #f6f7fb; color: #1a1d2e; }
    .wrap { text-align: center; padding: 32px; max-width: 360px; }
    .logo { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 16px; background: #1647A8; color: #fff; font-weight: 700; font-size: 18px; letter-spacing: -0.04em; margin-bottom: 20px; }
    h1 { margin: 0 0 8px; font-size: 18px; font-weight: 700; }
    p { margin: 0 0 24px; font-size: 14px; color: #5a6079; line-height: 1.6; }
    button { background: #1647A8; color: #fff; border: 0; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Eland</div>
    <h1>오프라인 상태입니다</h1>
    <p>네트워크 연결을 확인한 뒤 다시 시도해주세요. AI 캠퍼스는 인터넷 연결이 필요합니다.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
